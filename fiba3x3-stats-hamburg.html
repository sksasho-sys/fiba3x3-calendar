*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141210;--s1:#1c1916;--s2:#222018;--s3:#2c2820;--s4:#38332a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0ece4;--muted:#6b6256;--muted2:#9e9082;
  --accent:#e8400c;--ch:#38bdf8;--ch-bg:rgba(56,189,248,0.10);
  --won:#34d399;--lost:#f87171;
  --hero-grad:linear-gradient(150deg,#10181e 0%,#141210 60%);
  --tabs-bg:rgba(20,18,16,0.95);
}
[data-theme="light"]{
  --bg:#faf8f5;--s1:#ffffff;--s2:#f3f0eb;--s3:#e8e3da;--s4:#dcd6cc;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1612;--muted:#a09080;--muted2:#6e5e50;
  --accent:#d13408;--ch:#0369a1;--ch-bg:rgba(3,105,161,0.09);
  --won:#0f766e;--lost:#be123c;
  --hero-grad:linear-gradient(150deg,#e0eef5 0%,#faf8f5 60%);
  --tabs-bg:rgba(250,248,245,0.97);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;-webkit-tap-highlight-color:transparent}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.5}
[data-theme="light"] body::after{opacity:.15}
.topbar{position:sticky;top:0;z-index:100;background:var(--tabs-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border2);padding:0 2rem}
.topbar-inner{max-width:1040px;margin:0 auto;height:56px;display:flex;align-items:center;gap:14px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);text-decoration:none;padding:5px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;transition:all .15s;flex-shrink:0}
.back-link:hover{color:var(--text);background:var(--s3)}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.06em;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:3px;background:var(--ch-bg);color:var(--ch);border:1px solid rgba(56,189,248,.22);white-space:nowrap;flex-shrink:0}
[data-theme="light"] .topbar-badge{border-color:rgba(3,105,161,.22)}
.theme-toggle-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .2s;flex-shrink:0}
.theme-toggle-btn:hover{color:var(--text)}
.theme-toggle-btn svg{width:14px;height:14px;transition:transform .3s}
.theme-toggle-btn:hover svg{transform:rotate(18deg)}
.t-sun{display:none}.t-moon{display:block}
[data-theme="light"] .t-sun{display:block}[data-theme="light"] .t-moon{display:none}
.hero-strip{background:var(--hero-grad);border-bottom:1px solid var(--border2);padding:1.8rem 2rem 1.4rem;position:relative;overflow:hidden}
.hero-bg{position:absolute;right:-0.04em;top:-0.1em;font-family:'Bebas Neue',sans-serif;font-size:clamp(80px,16vw,180px);line-height:1;color:rgba(56,189,248,0.05);pointer-events:none;user-select:none}
[data-theme="light"] .hero-bg{color:rgba(3,105,161,0.04)}
.hero-inner{max-width:1040px;margin:0 auto;position:relative;z-index:1}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ch);display:flex;align-items:center;gap:8px;margin-bottom:.4rem}
.hero-eyebrow::before{content:'';width:18px;height:2px;background:var(--ch);flex-shrink:0}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,46px);line-height:.95;letter-spacing:.02em;margin-bottom:.8rem}
.hero-title em{color:var(--accent);font-style:normal}
.hero-meta{display:flex;flex-wrap:wrap;gap:1.2rem;align-items:center;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2)}
.hero-meta strong{color:var(--text);font-weight:500}
.finish-row{max-width:1040px;margin:0 auto;padding:.75rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;overflow-x:auto}
.finish-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);flex-shrink:0}
.finish-pill{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:4px;border:1px solid var(--border2);color:var(--muted2);white-space:nowrap}
.finish-pos{font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1;color:var(--ch)}
.finish-pill.gold .finish-pos{color:#f0a500}
.finish-pill.silver .finish-pos{color:#a0aec0}
.finish-pill.bronze .finish-pos{color:#cd7c42}
.filter-row{max-width:1040px;margin:0 auto;padding:.9rem 2rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.filter-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);flex-shrink:0}
.team-chip{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 11px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .14s;white-space:nowrap}
.team-chip:hover{color:var(--text);border-color:rgba(255,255,255,.22)}
[data-theme="light"] .team-chip:hover{border-color:rgba(0,0,0,.2)}
.team-chip.active{background:var(--text);color:var(--bg);border-color:transparent}
.content{max-width:1040px;margin:0 auto;padding:1.5rem 2rem 5rem}
.team-block{background:var(--s1);border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:1.5rem}
.team-title{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--s2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.team-title:hover{background:var(--s3)}
.team-title h2{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;color:var(--text)}
.team-meta{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--muted);margin-left:auto;display:flex;gap:10px;align-items:center}
.toggle-icon{font-size:14px;color:var(--muted);transition:transform .2s}
.team-body-wrap{overflow-x:auto}
.team-body-wrap.collapsed{display:none}
.team-title.collapsed .toggle-icon{transform:rotate(-90deg)}
.team-finish{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;padding:2px 8px;border-radius:3px;background:var(--s3);color:var(--muted2);border:1px solid var(--border)}
.team-finish.gold{background:rgba(240,165,0,.12);color:#f0a500;border-color:rgba(240,165,0,.25)}
.team-finish.silver{background:rgba(160,174,192,.12);color:#a0aec0;border-color:rgba(160,174,192,.25)}
.team-finish.bronze{background:rgba(205,124,66,.12);color:#cd7c42;border-color:rgba(205,124,66,.25)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--s2);padding:7px 8px;border-bottom:1px solid var(--border2);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);font-weight:500;white-space:nowrap}
thead th.center{text-align:center}
thead th.divider{border-left:2px solid var(--border2)}
thead th.game-th{text-align:center;min-width:52px}
tbody tr{border-top:1px solid var(--border)}
tbody tr:hover{background:var(--s2)}
td{padding:7px 8px;vertical-align:middle}
td.num{text-align:center;color:var(--muted);font-size:11px;width:28px}
td.name{font-weight:500;max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
td.pts{text-align:center;font-weight:600;color:var(--text)}
td.pts-zero{text-align:center;color:var(--muted);font-weight:400}
td.pts-dash{text-align:center;color:var(--border2)}
td.divider{border-left:2px solid var(--border2)}
td.total{text-align:center;font-weight:700;color:var(--text)}
td.avg{text-align:center;color:var(--muted2);font-family:'DM Mono',monospace;font-size:11px}
tr.totrow td{background:var(--s3);font-weight:600;border-top:2px solid var(--border2);color:var(--muted2);font-size:11px;font-family:'DM Mono',monospace}
tr.totrow td.total{color:var(--text);font-size:14px}
.game-header-opp{display:block;font-size:10px;color:var(--muted2);margin-bottom:1px;white-space:nowrap}
.game-header-score{display:block;font-size:10px;font-weight:600}
.won{color:var(--won)}.lost{color:var(--lost)}
.empty{text-align:center;padding:4rem 0;color:var(--muted)}
.empty-big{font-family:'Bebas Neue',sans-serif;font-size:52px;display:block;color:var(--s4);margin-bottom:.4rem}
@media(max-width:640px){
  .topbar{padding:0 1rem}.topbar-inner{gap:8px}
  .hero-strip{padding:1.4rem 1rem 1rem}
  .filter-row,.finish-row{padding:.75rem 1rem}
  .content{padding:1rem 1rem 3rem}
  .topbar-title{font-size:14px}
  .back-link span{display:none}
}

const GAME_ORDER = ["d58e2b82", "a08309c2", "f3d206a5", "2fbf4a41", "822742cc", "b287f885", "439ca0df", "c7cd55fc", "b39fda67", "fc76dc0e", "1dafd721", "5a0c521e", "0fceabd1", "6caec5cd", "96e598d0", "3e53abd3", "6f24b26d", "f32fb7d8", "51fb3a0f", "be6b8db1", "b8d01228", "1903111a", "efe74086", "849e4820", "60943f7d"];

const FINISH_ORDER = ["Amsterdam", "Toulouse", "Aachen", "Fuengirola", "Liberec", "Cibona", "Oldenburg", "Barcelona", "Bochum", "Los Angeles", "Toronto", "Bayreuth", "Brussels", "Marijampole", "Utrecht", "Valencia"];

const gameIndex = {};
for (const r of RAW) {
  const [gid,ht,hs,as_,at] = r;
  if (!gameIndex[gid]) gameIndex[gid] = {gid,ht,hs:+hs,as:+as_,at};
}

function buildData() {
  const td = {};
  for (const r of RAW) {
    const [gid,ht,hs,as_,at,team,num,name,pts] = r;
    if (!td[team]) td[team] = {};
    if (!td[team][name]) td[team][name] = {num, games:{}};
    td[team][name].games[gid] = +pts;
  }
  return td;
}

const teamData = buildData();
let activeTeams = new Set();

function rankTeams() {
  const available = Object.keys(teamData);
  return [...FINISH_ORDER.filter(t=>available.includes(t)), ...available.filter(t=>!FINISH_ORDER.includes(t)).sort()];
}

function getTeamGames(team) {
  const gids = new Set();
  for (const pd of Object.values(teamData[team]))
    for (const gid of Object.keys(pd.games)) gids.add(gid);
  return GAME_ORDER.filter(gid => gids.has(gid));
}

function getFinishClass(pos){return pos===1?'gold':pos===2?'silver':pos===3?'bronze':'';}

function updateHero() {
  const teams = rankTeams();
  const gids = new Set(); let players = 0;
  for (const t of teams) { getTeamGames(t).forEach(id=>gids.add(id)); players+=Object.keys(teamData[t]).length; }
  document.getElementById('hero-games').textContent = gids.size+' games';
  document.getElementById('hero-players').textContent = players+' players';
}

function renderFinishRow() {
  const row = document.getElementById('finish-row');
  row.innerHTML = '<span class="finish-label">Final standings:</span>';
  FINISH_ORDER.forEach((team,i) => {
    const pos=i+1, cls=getFinishClass(pos);
    const pill=document.createElement('div');
    pill.className='finish-pill'+(cls?' '+cls:'');
    pill.innerHTML=`<span class="finish-pos">${pos}</span><span>${team}</span>`;
    row.appendChild(pill);
  });
}

function renderChips() {
  const fr = document.getElementById('filter-row');
  fr.innerHTML = '<span class="filter-label">Teams:</span>';
  for (const t of rankTeams()) {
    const b=document.createElement('button');
    b.className='team-chip'+(activeTeams.has(t)?' active':'');
    b.textContent=t;
    b.onclick=()=>{activeTeams.has(t)?activeTeams.delete(t):activeTeams.add(t);renderAll();};
    fr.appendChild(b);
  }
}

function renderAll() {
  updateHero(); renderFinishRow(); renderChips();
  const teams=rankTeams();
  const show=activeTeams.size>0?teams.filter(t=>activeTeams.has(t)):teams;
  const content=document.getElementById('content');
  content.innerHTML='';
  if(!show.length){content.innerHTML='<div class="empty"><span class="empty-big">NO DATA</span>No teams selected.</div>';return;}
  for (const team of show) content.appendChild(buildBlock(team, FINISH_ORDER.indexOf(team)+1));
}

function buildBlock(team,pos) {
  const players=teamData[team], allGames=getTeamGames(team);
  const sorted=Object.entries(players).sort((a,b)=>{
    const ta=Object.values(a[1].games).reduce((s,v)=>s+v,0);
    const tb=Object.values(b[1].games).reduce((s,v)=>s+v,0);
    return tb-ta;
  });
  const block=document.createElement('div'); block.className='team-block';
  const finCls=getFinishClass(pos);
  const finLabel=pos?`<span class="team-finish${finCls?' '+finCls:''}">${pos}${pos===1?'st':pos===2?'nd':pos===3?'rd':'th'}</span>`:'';
  const title=document.createElement('div'); title.className='team-title';
  title.innerHTML=`<h2>${team}</h2>${finLabel}<span class="team-meta">${allGames.length} game${allGames.length!==1?'s':''} · ${sorted.length} players</span><span class="toggle-icon">▾</span>`;
  const bodyWrap=document.createElement('div'); bodyWrap.className='team-body-wrap';
  title.onclick=()=>{bodyWrap.classList.toggle('collapsed');title.classList.toggle('collapsed');};
  block.appendChild(title);
  const table=document.createElement('table');
  const thead=document.createElement('thead');
  const tr1=document.createElement('tr');
  tr1.appendChild(mkTh('#','num')); tr1.appendChild(mkTh('Player',''));
  for (let i=0;i<allGames.length;i++){
    const gid=allGames[i],gi=gameIndex[gid];
    const opp=gi.ht===team?gi.at:gi.ht;
    const myS=gi.ht===team?gi.hs:gi.as,opS=gi.ht===team?gi.as:gi.hs;
    const won=myS>opS;
    const cell=mkTh('','game-th center'+(i===0?' divider':''));
    cell.innerHTML=`<span class="game-header-opp">${opp}</span><span class="game-header-score ${won?'won':'lost'}">${myS}–${opS}</span>`;
    tr1.appendChild(cell);
  }
  tr1.appendChild(mkTh('Total','center divider')); tr1.appendChild(mkTh('Avg','center'));
  thead.appendChild(tr1); table.appendChild(thead);
  const tbody=document.createElement('tbody');
  for (const [name,pd] of sorted){
    const total=Object.values(pd.games).reduce((s,v)=>s+v,0);
    const gp=Object.keys(pd.games).length;
    const avg=gp>0?(total/gp).toFixed(1):'—';
    const tr=document.createElement('tr');
    tr.appendChild(mkTd(pd.num,'num')); tr.appendChild(mkTd(name,'name'));
    for (let i=0;i<allGames.length;i++){
      const gid=allGames[i],pts=pd.games[gid];
      const cls=(i===0?'divider ':'')+(pts===undefined?'pts-dash':pts===0?'pts-zero':'pts');
      tr.appendChild(mkTd(pts===undefined?'—':String(pts),cls));
    }
    tr.appendChild(mkTd(String(total),'total divider')); tr.appendChild(mkTd(avg,'avg'));
    tbody.appendChild(tr);
  }
  const totRow=document.createElement('tr'); totRow.className='totrow';
  totRow.appendChild(mkTd('','')); totRow.appendChild(mkTd('Team total',''));
  let grand=0;
  for (let i=0;i<allGames.length;i++){
    const gid=allGames[i],col=sorted.reduce((s,[,pd])=>s+(pd.games[gid]||0),0);
    grand+=col;
    totRow.appendChild(mkTd(String(col),(i===0?'divider ':'')+' center'));
  }
  totRow.appendChild(mkTd(String(grand),'total divider')); totRow.appendChild(mkTd('',''));
  tbody.appendChild(totRow); table.appendChild(tbody);
  bodyWrap.appendChild(table); block.appendChild(bodyWrap);
  return block;
}

function mkTh(text,cls){const el=document.createElement('th');if(cls)el.className=cls;if(text)el.textContent=text;return el;}
function mkTd(text,cls){const el=document.createElement('td');if(cls)el.className=cls;el.textContent=text;return el;}

renderAll();

<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women's Series — Team Participation | FIBA 3×3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141210;--s1:#1c1916;--s2:#222018;--s3:#2c2820;--s4:#38332a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0ece4;--muted:#6b6256;--muted2:#9e9082;
  --accent:#e8400c;--ws:#f472b6;--ws-bg:rgba(244,114,182,0.10);
  --hero-grad:linear-gradient(150deg,#1e1018 0%,#141210 60%);
  --tabs-bg:rgba(20,18,16,0.95);
}
[data-theme="light"]{
  --bg:#faf8f5;--s1:#ffffff;--s2:#f3f0eb;--s3:#e8e3da;--s4:#dcd6cc;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1612;--muted:#a09080;--muted2:#6e5e50;
  --accent:#d13408;--ws:#be123c;--ws-bg:rgba(244,114,182,0.09);
  --hero-grad:linear-gradient(150deg,#f5e0ea 0%,#faf8f5 60%);
  --tabs-bg:rgba(250,248,245,0.97);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;-webkit-tap-highlight-color:transparent}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.5}
[data-theme="light"] body::after{opacity:.15}

.topbar{position:sticky;top:0;z-index:100;background:var(--tabs-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border2);padding:0 2rem}
.topbar-inner{max-width:1200px;margin:0 auto;height:56px;display:flex;align-items:center;gap:14px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);text-decoration:none;padding:5px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;transition:all .15s;flex-shrink:0}
.back-link:hover{color:var(--text);background:var(--s3)}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.06em;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:3px;background:var(--ws-bg);color:var(--ws);border:1px solid rgba(244,114,182,.22);white-space:nowrap;flex-shrink:0}
[data-theme="light"] .topbar-badge{border-color:rgba(190,18,60,.22)}
.theme-toggle-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .2s;flex-shrink:0}
.theme-toggle-btn:hover{color:var(--text)}
.theme-toggle-btn svg{width:14px;height:14px;transition:transform .3s}
.theme-toggle-btn:hover svg{transform:rotate(18deg)}
.t-sun{display:none}.t-moon{display:block}
[data-theme="light"] .t-sun{display:block}[data-theme="light"] .t-moon{display:none}

.hero-strip{background:var(--hero-grad);border-bottom:1px solid var(--border2);padding:1.8rem 2rem 1.4rem;position:relative;overflow:hidden}
.hero-bg{position:absolute;right:-0.04em;top:-0.1em;font-family:'Bebas Neue',sans-serif;font-size:clamp(80px,16vw,180px);line-height:1;color:rgba(244,114,182,0.05);pointer-events:none;user-select:none}
[data-theme="light"] .hero-bg{color:rgba(190,18,60,0.04)}
.hero-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ws);display:flex;align-items:center;gap:8px;margin-bottom:.4rem}
.hero-eyebrow::before{content:'';width:18px;height:2px;background:var(--ws);flex-shrink:0}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,46px);line-height:.95;letter-spacing:.02em;margin-bottom:.8rem}
.hero-title em{color:var(--accent);font-style:normal}
.hero-meta{display:flex;flex-wrap:wrap;gap:1.2rem;align-items:center;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2)}
.hero-meta strong{color:var(--text);font-weight:500}

.controls{max-width:1200px;margin:0 auto;padding:.9rem 2rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.search-box{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--s1)}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px}
.search-box svg{width:14px;height:14px;color:var(--muted);flex-shrink:0}
.hint{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}

.wrap{max-width:1200px;margin:0 auto;padding:1rem 2rem 5rem;overflow-x:auto}

table.matrix{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;min-width:800px}
table.matrix thead th{position:sticky;top:0;background:var(--s2);z-index:2}
.th-team{text-align:left;padding:10px 12px;border-bottom:2px solid var(--border2);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);font-weight:500;position:sticky;left:0;background:var(--s2);z-index:3;min-width:150px}
.th-tour{padding:10px 6px;border-bottom:2px solid var(--border2);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2);font-weight:500;text-align:center;min-width:58px;vertical-align:bottom}
.th-tour a{color:var(--ws);text-decoration:none}
.th-tour a:hover{text-decoration:underline}
.th-count{padding:10px 8px;border-bottom:2px solid var(--border2);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-align:center;min-width:40px}

tr.team-row{border-top:1px solid var(--border);cursor:pointer;transition:background .12s}
tr.team-row:hover{background:var(--s2)}
tr.team-row td{padding:0;border-bottom:1px solid var(--border)}
.team-cell{display:flex;align-items:center;gap:8px;padding:9px 12px;position:sticky;left:0;background:var(--bg);z-index:1;min-width:150px}
tr.team-row:hover .team-cell{background:var(--s2)}
.team-cell .caret{font-size:10px;color:var(--muted);transition:transform .18s;flex-shrink:0}
tr.expanded .team-cell .caret{transform:rotate(90deg)}
.team-name{font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell-check{text-align:center;vertical-align:middle}
.cell-check a{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;background:var(--ws-bg);color:var(--ws);text-decoration:none;transition:all .14s}
.cell-check a:hover{background:var(--ws);color:#fff;transform:scale(1.12)}
.cell-check a svg{width:12px;height:12px}
.cell-empty{text-align:center;color:var(--s4)}
.cell-count{text-align:center;font-family:'DM Mono',monospace;font-weight:600;color:var(--text)}

/* Player detail row */
tr.detail-row td{padding:0;border-bottom:1px solid var(--border);background:var(--s1)}
.detail-inner{padding:0;overflow-x:auto}
.detail-inner.collapsed{display:none}
table.players{width:100%;border-collapse:collapse;font-size:11px}
table.players th{background:var(--s2);padding:6px 8px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2);font-weight:500;text-align:center;white-space:nowrap}
table.players th.pl-name{text-align:left;position:sticky;left:0;background:var(--s2);min-width:160px}
table.players td{padding:5px 8px;border-bottom:1px solid var(--border);text-align:center}
table.players td.pl-name{text-align:left;color:var(--text);font-weight:500;position:sticky;left:0;background:var(--s1);white-space:nowrap}
table.players tr:hover td{background:var(--s2)}
table.players tr:hover td.pl-name{background:var(--s2)}
.pl-check{color:var(--ws);font-weight:700}
.pl-dot{color:var(--s4)}
.detail-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 12px;background:var(--s2);border-bottom:1px solid var(--border)}

.empty{text-align:center;padding:4rem 0;color:var(--muted)}
.empty-big{font-family:'Bebas Neue',sans-serif;font-size:52px;display:block;color:var(--s4);margin-bottom:.4rem}

@media(max-width:640px){
  .topbar{padding:0 1rem}.hero-strip{padding:1.4rem 1rem 1rem}
  .controls{padding:.75rem 1rem}.wrap{padding:1rem 1rem 3rem}
  .topbar-title{font-size:14px}.back-link span{display:none}
}
</style>
</head>

document.getElementById('hero-teams').textContent = TEAMS.length + ' teams';
document.getElementById('hero-tours').textContent = TOURNAMENTS.length + ' tournaments';

const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const expanded = new Set();

function playerTournaments(team) {
  // Build set of all players for this team + which tournaments each played
  const pmap = {}; // player -> Set(tournament)
  for (const [tour, players] of Object.entries(team.t)) {
    for (const p of players) {
      (pmap[p] = pmap[p] || new Set()).add(tour);
    }
  }
  return pmap;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const wrap = document.getElementById('wrap');

  // Filter teams by team name OR any player name
  let teams = TEAMS;
  if (q) {
    teams = TEAMS.filter(tm => {
      if (tm.name.toLowerCase().includes(q)) return true;
      for (const players of Object.values(tm.t))
        if (players.some(p => p.toLowerCase().includes(q))) return true;
      return false;
    });
  }

  if (!teams.length) {
    wrap.innerHTML = '<div class="empty"><span class="empty-big">NO MATCH</span>No teams or players found.</div>';
    return;
  }

  // Build matrix table
  let html = '<table class="matrix"><thead><tr>';
  html += '<th class="th-team">Team</th>';
  html += '<th class="th-count">#</th>';
  for (const tour of TOURNAMENTS) {
    html += `<th class="th-tour"><a href="${PAGES[tour]}" title="Open ${tour} stats">${tour}</a></th>`;
  }
  html += '</tr></thead><tbody>';

  for (const team of teams) {
    const count = Object.keys(team.t).length;
    const tid = 'team-' + team.name.replace(/[^a-zA-Z0-9]/g,'_');
    const isExp = expanded.has(team.name);
    html += `<tr class="team-row${isExp?' expanded':''}" data-team="${encodeURIComponent(team.name)}">`;
    html += `<td><div class="team-cell"><span class="caret">▶</span><span class="team-name">${team.name}</span></div></td>`;
    html += `<td class="cell-count">${count}</td>`;
    for (const tour of TOURNAMENTS) {
      if (team.t[tour]) {
        html += `<td class="cell-check"><a href="${PAGES[tour]}" title="${team.name} · ${tour} — open stats" onclick="event.stopPropagation()">${CHECK}</a></td>`;
      } else {
        html += `<td class="cell-empty">·</td>`;
      }
    }
    html += '</tr>';

    // Detail row (player table)
    if (isExp) {
      const pmap = playerTournaments(team);
      const players = Object.keys(pmap).sort();
      html += `<tr class="detail-row"><td colspan="${TOURNAMENTS.length+2}"><div class="detail-inner">`;
      html += `<div class="detail-label">${players.length} players · ${team.name}</div>`;
      html += '<table class="players"><thead><tr><th class="pl-name">Player</th>';
      // only show tournaments this team actually attended
      const teamTours = TOURNAMENTS.filter(t => team.t[t]);
      for (const tour of teamTours) html += `<th>${tour}</th>`;
      html += '</tr></thead><tbody>';
      for (const p of players) {
        html += `<tr><td class="pl-name">${p}</td>`;
        for (const tour of teamTours) {
          html += pmap[p].has(tour) ? '<td class="pl-check">✓</td>' : '<td class="pl-dot">·</td>';
        }
        html += '</tr>';
      }
      html += '</tbody></table></div></td></tr>';
    }
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;

  // Row click handlers (toggle expand)
  wrap.querySelectorAll('tr.team-row').forEach(row => {
    row.addEventListener('click', () => {
      const name = decodeURIComponent(row.dataset.team);
      expanded.has(name) ? expanded.delete(name) : expanded.add(name);
      render();
    });
  });
}

document.getElementById('search').addEventListener('input', render);
render();
</script>

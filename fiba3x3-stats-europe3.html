<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEME TOKENS ── */
:root {
  --bg:      #141210;
  --s1:      #1c1916;
  --s2:      #222018;
  --s3:      #2c2820;
  --s4:      #38332a;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text:    #f0ece4;
  --muted:   #6b6256;
  --muted2:  #9e9082;
  --accent:  #e8400c;
  --nl:      #a78bfa;
  --nl-bg:   rgba(167,139,250,0.10);
  --won:     #34d399;
  --lost:    #f87171;
  --hero-grad: linear-gradient(150deg, #1e1a14 0%, #141210 60%);
  --tabs-bg: rgba(20,18,16,0.95);
}
[data-theme="light"] {
  --bg:      #faf8f5;
  --s1:      #ffffff;
  --s2:      #f3f0eb;
  --s3:      #e8e3da;
  --s4:      #dcd6cc;
  --border:  rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text:    #1a1612;
  --muted:   #a09080;
  --muted2:  #6e5e50;
  --accent:  #d13408;
  --nl:      #6d28d9;
  --nl-bg:   rgba(109,40,217,0.09);
  --won:     #0f766e;
  --lost:    #be123c;
  --hero-grad: linear-gradient(150deg, #f0ece3 0%, #faf8f5 60%);
  --tabs-bg: rgba(250,248,245,0.97);
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* grain */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:.5;
}
[data-theme="light"] body::after { opacity:.15; }

/* ── TOPBAR ── */
.topbar {
  position: sticky; top:0; z-index:100;
  background: var(--tabs-bg);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border2);
  padding: 0 2rem;
}
.topbar-inner {
  max-width: 1040px; margin: 0 auto;
  height: 56px;
  display: flex; align-items: center; gap: 14px; flex-wrap: nowrap;
}
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted2); text-decoration: none;
  padding: 5px 10px; border-radius: 5px;
  border: 1px solid var(--border2); background: transparent;
  transition: all .15s; flex-shrink: 0;
}
.back-link:hover { color: var(--text); border-color: var(--border2); background: var(--s3); }
.topbar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px; letter-spacing: .06em;
  color: var(--text); flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.topbar-nl-badge {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 3px;
  background: var(--nl-bg); color: var(--nl); border: 1px solid rgba(167,139,250,.22);
  white-space: nowrap; flex-shrink: 0;
}
[data-theme="light"] .topbar-nl-badge { background: rgba(109,40,217,0.09); color: var(--nl); border-color: rgba(109,40,217,.22); }

/* gender toggle */
.gender-toggle {
  display: flex; border: 1px solid var(--border2); border-radius: 6px; overflow: hidden; flex-shrink:0;
}
.gender-btn {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  padding: 5px 13px; border: none; background: none; cursor: pointer;
  color: var(--muted2); transition: all .14s;
}
.gender-btn.active { background: var(--text); color: var(--bg); }

/* theme toggle */
.theme-toggle-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 6px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted2); cursor: pointer; transition: all .2s; flex-shrink:0;
}
.theme-toggle-btn:hover { color: var(--text); }
.theme-toggle-btn svg { width:14px; height:14px; transition: transform .3s; }
.theme-toggle-btn:hover svg { transform: rotate(18deg); }
.t-sun { display:none; }
.t-moon { display:block; }
[data-theme="light"] .t-sun { display:block; }
[data-theme="light"] .t-moon { display:none; }

/* ── HERO STRIP ── */
.hero-strip {
  background: var(--hero-grad);
  border-bottom: 1px solid var(--border2);
  padding: 1.8rem 2rem 1.4rem;
  position: relative; overflow: hidden;
}
.hero-strip-bg {
  position: absolute; right: -0.04em; top: -0.1em;
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(80px,16vw,180px);
  line-height:1; color: rgba(167,139,250,0.05); pointer-events:none; user-select:none;
}
.hero-strip-inner { max-width: 1040px; margin: 0 auto; position:relative; z-index:1; }
.hero-strip-eyebrow {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--nl); display: flex; align-items: center; gap: 8px; margin-bottom: .4rem;
}
.hero-strip-eyebrow::before { content:''; width:18px; height:2px; background:var(--nl); flex-shrink:0; }
.hero-strip-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 5vw, 46px); line-height:.95; letter-spacing:.02em;
  margin-bottom:.8rem;
}
.hero-strip-title em { color: var(--accent); font-style:normal; }
.hero-strip-meta {
  display: flex; flex-wrap: wrap; gap: 1.2rem; align-items: center;
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted2);
}
.hero-strip-meta strong { color: var(--text); font-weight:500; }

/* ── TEAM FILTER ROW ── */
.filter-row {
  max-width: 1040px; margin: 0 auto;
  padding: .9rem 2rem;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}
.filter-label {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); flex-shrink: 0;
}
.team-chip {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  padding: 4px 11px; border-radius: 4px;
  border: 1px solid var(--border2); background: transparent; color: var(--muted2);
  cursor: pointer; transition: all .14s; white-space: nowrap;
}
.team-chip:hover { color: var(--text); border-color: rgba(255,255,255,.22); }
[data-theme="light"] .team-chip:hover { border-color: rgba(0,0,0,.2); }
.team-chip.active { background: var(--text); color: var(--bg); border-color: transparent; }

/* ── CONTENT ── */
.content { max-width: 1040px; margin: 0 auto; padding: 1.5rem 2rem 5rem; }

/* team block */
.team-block {
  background: var(--s1);
  border: 1px solid var(--border2);
  border-radius: 10px; overflow: hidden;
  margin-bottom: 1.5rem;
}
.team-title {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: var(--s2);
  border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
.team-title:hover { background: var(--s3); }
.team-title h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: .04em; color: var(--text);
}
.team-meta { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.1em; color:var(--muted); margin-left:auto; }
.toggle-icon { font-size:14px; color:var(--muted); transition:transform .2s; }
.team-body-wrap { overflow-x: auto; }
.team-body-wrap.collapsed { display: none; }
.team-title.collapsed .toggle-icon { transform: rotate(-90deg); }

.gender-tag {
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase;
  padding:2px 7px; border-radius:3px; font-weight:500;
}
.gender-tag.w { background:rgba(248,113,113,.12); color:#f87171; border:1px solid rgba(248,113,113,.22); }
.gender-tag.m { background:rgba(56,189,248,.12); color:#38bdf8; border:1px solid rgba(56,189,248,.22); }
[data-theme="light"] .gender-tag.w { background:rgba(190,18,60,.09); color:#be123c; border-color:rgba(190,18,60,.2); }
[data-theme="light"] .gender-tag.m { background:rgba(3,105,161,.09); color:#0369a1; border-color:rgba(3,105,161,.2); }

/* ── TABLE ── */
table { width:100%; border-collapse:collapse; font-size:12px; }
thead th {
  background: var(--s2);
  padding: 7px 8px;
  border-bottom: 1px solid var(--border2);
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted2); font-weight: 500; white-space: nowrap;
  position: sticky; top: 0;
}
thead th.col-num { text-align:center; }
thead th.divider { border-left: 2px solid var(--border2); }
thead th.stop-group {
  text-align:center;
  background: var(--s3);
  border-left: 2px solid var(--border2);
  color: var(--nl); letter-spacing: .12em;
}

tbody tr { border-top: 1px solid var(--border); }
tbody tr:hover { background: var(--s2); }
td { padding: 7px 8px; vertical-align: middle; }

.col-num { width:28px; text-align:center; color:var(--muted); }
.col-name { min-width:140px; max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; color:var(--text); }
.col-pts { text-align:center; min-width:36px; font-weight:600; color:var(--text); }
.col-total { text-align:center; min-width:40px; font-weight:700; color:var(--text); }
.col-avg { text-align:center; min-width:38px; color:var(--muted2); font-family:'DM Mono',monospace; font-size:11px; }
.pts-zero { color:var(--muted) !important; font-weight:400 !important; }
.pts-dash { color:var(--border2); text-align:center; }
.divider { border-left: 2px solid var(--border2); }
.total-row td { background:var(--s3); font-weight:600; border-top:2px solid var(--border2); color:var(--muted2); font-size:11px; font-family:'DM Mono',monospace; }
.total-row td.col-total { color:var(--text); font-size:14px; }

.score-won { color:var(--won); font-weight:600; font-size:10px; }
.score-lost { color:var(--lost); font-weight:600; font-size:10px; }
.opp-name { display:block; font-size:10px; color:var(--muted2); margin-bottom:1px; white-space:nowrap; }

/* badges */
.badge-new { font-size:9px; padding:1px 5px; border-radius:3px; background:rgba(240,165,0,.15); color:var(--wt,#f0a500); margin-left:4px; }
.badge-left { font-size:9px; padding:1px 5px; border-radius:3px; background:rgba(248,113,113,.12); color:#f87171; margin-left:4px; }
[data-theme="light"] .badge-new { background:rgba(184,120,0,.12); color:#b87800; }
[data-theme="light"] .badge-left { background:rgba(190,18,60,.1); color:#be123c; }

/* empty */
.empty { text-align:center; padding:4rem 0; color:var(--muted); }
.empty-big { font-family:'Bebas Neue',sans-serif; font-size:52px; display:block; color:var(--s4); margin-bottom:.4rem; }

@media(max-width:640px){
  .topbar { padding: 0 1rem; }
  .topbar-inner { gap:8px; }
  .hero-strip { padding:1.4rem 1rem 1rem; }
  .filter-row { padding:.75rem 1rem; }
  .content { padding:1rem 1rem 3rem; }
  .topbar-title { font-size:14px; }
  .back-link span { display:none; }
}
</style>

// Women's player names (unique identifiers from the data)
const WOMEN_NAMES = new Set([
  "Marianna Byvatov","Olivia Okpara","Maja Marie Manten","Lilly Küppers",
  "Kilian Walter","Joshua Günther","David Galusic","Maximilian Matthias Eichbaum",
  "Ludovica Sammartino","Ilaria Bernardi","Nancy Alessandra N'guessan","Cristina Osazuwa",
  "Kenko Loredana Ngamene Takougang",
  "Ela Nur Gokcol","Salminaz Ramazanli","Shilan Akbingol","Adila Yusubova",
  "Danielė Paunksnytė","Urtė Čižauskaitė","Miglė Kisarauskaitė","Audronė Zdanevičiūtė",
  "Hana Sambolic","Tina Tomšič","Anja Dragar","Mia Žekš",
  "Lea Vukić","Ivana Mamić","Dalija Stabile","Jelena Brkičić","Elena Peričić",
]);
// Everyone else = Men

function isWomen(name) { return WOMEN_NAMES.has(name); }

// ── Build game index ──────────────────────────────────────────────────────────
const gameIndex = {}; // gid -> {stop,ht,hs,as,at}
for (const r of RAW) {
  const [stop,gid,,hs,,as,,,,,] = r;
  const ht=r[2], at=r[5];
  if (!gameIndex[gid]) gameIndex[gid] = {stop,ht,hs:+r[3],as:+r[4],at};
}

// ── Gender classification — by game ID ───────────────────────────────────────
const WOMEN_GAMES = new Set(["10db572a", "3dbd1f63", "41c2e5c2", "516b6e03", "89c37d2a", "91bd516e", "b3ce0e82"]);
const GAME_SEQ = ["41c2e5c2", "a895def6", "516b6e03", "01e40448", "91bd516e", "97cc46cf", "89c37d2a", "5126d674", "b3ce0e82", "cf96e302", "3dbd1f63", "dc76c722", "10db572a", "7872e7db"];

// ── Build per-team data ───────────────────────────────────────────────────────
// teamData[gender][team][playerName] = {num, games:{gid:pts}}
function buildTeamData() {
  const td = {W:{}, M:{}};
  for (const r of RAW) {
    const [stop,gid,ht,hs,as,at,team,num,name,pts] = r;
    const g = WOMEN_GAMES.has(gid) ? 'W' : 'M';
    if (!td[g][team]) td[g][team] = {};
    if (!td[g][team][name]) td[g][team][name] = {num, games:{}};
    td[g][team][name].games[gid] = +pts;
  }
  return td;
}

const teamData = buildTeamData();
let currentGender = 'W';
let visibleTeams = new Set();

function getTeamsForGender(g) { return Object.keys(teamData[g]).sort(); }
function getTeamGames(team, g) {
  const players = teamData[g][team];
  const gids = new Set();
  for (const pd of Object.values(players)) for (const gid of Object.keys(pd.games)) gids.add(gid);
  return [...gids].sort((a,b) => {
    const sa = gameIndex[a].stop, sb = gameIndex[b].stop;
    if (sa !== sb) return sa.localeCompare(sb);
    // chronological order within a stop = order games were played (CSV order)
    return GAME_SEQ.indexOf(a) - GAME_SEQ.indexOf(b);
  });
}

function updateHeroStats(g) {
  const teams = getTeamsForGender(g);
  const allGids = new Set();
  let players = 0;
  for (const t of teams) {
    const gs = getTeamGames(t, g);
    gs.forEach(id => allGids.add(id));
    players += Object.keys(teamData[g][t]).length;
  }
  document.getElementById('hero-games').textContent = (allGids.size/2|0) + ' games';
  document.getElementById('hero-players').textContent = players + ' players';
}

function renderAll() {
  const g = currentGender;
  const teams = getTeamsForGender(g);
  updateHeroStats(g);

  // Team filter chips
  const fr = document.getElementById('filter-row');
  fr.innerHTML = '<span class="filter-label">Teams:</span>';
  for (const t of teams) {
    const btn = document.createElement('button');
    btn.className = 'team-chip' + (visibleTeams.has(t) ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => { visibleTeams.has(t) ? visibleTeams.delete(t) : visibleTeams.add(t); renderAll(); };
    fr.appendChild(btn);
  }

  const content = document.getElementById('content');
  content.innerHTML = '';
  const filtered = visibleTeams.size > 0 ? teams.filter(t => visibleTeams.has(t)) : teams;
  if (!filtered.length) {
    content.innerHTML = '<div class="empty"><span class="empty-big">NO DATA</span>No teams selected.</div>';
    return;
  }
  for (const team of filtered) content.appendChild(buildTeamBlock(team, g));
}

function buildTeamBlock(team, g) {
  const players = teamData[g][team];
  const allGames = getTeamGames(team, g);
  const byStop = {};
  for (const gid of allGames) {
    const s = gameIndex[gid].stop;
    if (!byStop[s]) byStop[s] = [];
    byStop[s].push(gid);
  }
  const stops = Object.keys(byStop).sort();
  const playerStopMap = {};
  for (const [name, pd] of Object.entries(players))
    playerStopMap[name] = new Set(Object.keys(pd.games).map(g => gameIndex[g]?.stop));
  const sortedPlayers = Object.entries(players).sort((a,b) => {
    const ta = Object.values(a[1].games).reduce((s,v)=>s+v,0);
    const tb = Object.values(b[1].games).reduce((s,v)=>s+v,0);
    return tb-ta;
  });
  const totalGames = allGames.length;
  const block = document.createElement('div');
  block.className = 'team-block';

  const title = document.createElement('div');
  title.className = 'team-title';
  const gTag = g === 'W'
    ? '<span class="gender-tag w">W</span>'
    : '<span class="gender-tag m">M</span>';
  title.innerHTML = `${gTag}<h2>${team}</h2>
    <span class="team-meta">${totalGames} game${totalGames!==1?'s':''} · ${sortedPlayers.length} players</span>
    <span class="toggle-icon">▾</span>`;
  block.appendChild(title);

  const bodyWrap = document.createElement('div');
  bodyWrap.className = 'team-body-wrap';
  title.onclick = () => { bodyWrap.classList.toggle('collapsed'); title.classList.toggle('collapsed'); };

  const table = document.createElement('table');
  const thead = document.createElement('thead');

  // Row 1: stop group headers
  const trStop = document.createElement('tr');
  trStop.appendChild(mkTh('', 'col-num'));
  trStop.appendChild(mkTh('Player', 'col-name'));
  for (const stop of stops) {
    const th1 = document.createElement('th');
    th1.colSpan = byStop[stop].length;
    th1.className = 'stop-group';
    th1.textContent = stop;
    trStop.appendChild(th1);
  }
  const thTot = mkTh('Total', 'col-total divider');
  trStop.appendChild(thTot);
  trStop.appendChild(mkTh('Avg', 'col-avg'));
  thead.appendChild(trStop);

  // Row 2: opponent headers
  const trGame = document.createElement('tr');
  trGame.appendChild(mkTh('#', 'col-num'));
  trGame.appendChild(mkTh('', 'col-name'));
  for (const stop of stops) {
    for (let i = 0; i < byStop[stop].length; i++) {
      const gid = byStop[stop][i];
      const gi = gameIndex[gid];
      const opp = gi.ht === team ? gi.at : gi.ht;
      const myScore = gi.ht === team ? gi.hs : gi.as;
      const oppScore = gi.ht === team ? gi.as : gi.hs;
      const won = myScore > oppScore;
      const cell = mkTh('', 'col-pts' + (i===0 ? ' divider':''));
      cell.innerHTML = `<span class="opp-name">${opp}</span><span class="${won?'score-won':'score-lost'}">${myScore}–${oppScore}</span>`;
      trGame.appendChild(cell);
    }
  }
  trGame.appendChild(mkTh('', 'col-total divider'));
  trGame.appendChild(mkTh('', 'col-avg'));
  thead.appendChild(trGame);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  const allStops = stops;

  for (const [name, pd] of sortedPlayers) {
    const playerStops = playerStopMap[name];
    const total = Object.values(pd.games).reduce((s,v)=>s+v,0);
    const gp = Object.keys(pd.games).length;
    const avg = gp > 0 ? (total/gp).toFixed(1) : '—';
    const tr = document.createElement('tr');

    const tdNum = document.createElement('td');
    tdNum.className = 'col-num'; tdNum.textContent = pd.num; tr.appendChild(tdNum);

    const tdName = document.createElement('td');
    tdName.className = 'col-name';
    let nameHtml = name;
    const missedStops = allStops.filter(s => !playerStops.has(s));
    if (missedStops.length > 0 && playerStops.size > 0) {
      if (!playerStops.has(allStops[0])) nameHtml += `<span class="badge-new">from ${[...playerStops][0]}</span>`;
      else if (!playerStops.has(allStops[allStops.length-1])) nameHtml += `<span class="badge-left">left</span>`;
    }
    tdName.innerHTML = nameHtml;
    tr.appendChild(tdName);

    for (const stop of stops) {
      for (let i = 0; i < byStop[stop].length; i++) {
        const gid = byStop[stop][i];
        const td = document.createElement('td');
        if (i===0) td.classList.add('divider');
        const pts = pd.games[gid];
        if (pts === undefined) {
          td.className += ' pts-dash'; td.textContent = '—';
        } else if (pts === 0) {
          td.className += ' pts-zero col-pts'; td.textContent = '0';
        } else {
          td.className += ' col-pts'; td.textContent = pts;
        }
        tr.appendChild(td);
      }
    }

    const tdTot = document.createElement('td');
    tdTot.className = 'col-total divider'; tdTot.textContent = total; tr.appendChild(tdTot);
    const tdAvg = document.createElement('td');
    tdAvg.className = 'col-avg'; tdAvg.textContent = avg; tr.appendChild(tdAvg);
    tbody.appendChild(tr);
  }

  // Team totals row
  const trTot = document.createElement('tr');
  trTot.className = 'total-row';
  const tdN = document.createElement('td'); tdN.textContent = ''; trTot.appendChild(tdN);
  const tdNm = document.createElement('td'); tdNm.textContent = 'Team total'; trTot.appendChild(tdNm);
  let grand = 0;
  for (const stop of stops) {
    for (let i = 0; i < byStop[stop].length; i++) {
      const gid = byStop[stop][i];
      const col = sortedPlayers.reduce((s,[,pd])=>s+(pd.games[gid]||0),0);
      grand += col;
      const td = document.createElement('td');
      td.style.textAlign='center';
      if (i===0) td.classList.add('divider');
      td.textContent = col; trTot.appendChild(td);
    }
  }
  const tdG = document.createElement('td'); tdG.className='col-total divider'; tdG.textContent=grand; trTot.appendChild(tdG);
  const tdGA = document.createElement('td'); tdGA.textContent=''; trTot.appendChild(tdGA);
  tbody.appendChild(trTot);

  table.appendChild(tbody);
  bodyWrap.appendChild(table);
  block.appendChild(bodyWrap);
  return block;
}

function mkTh(text, cls) {
  const el = document.createElement('th');
  if (cls) el.className = cls;
  el.textContent = text;
  return el;
}

function setGender(g) {
  currentGender = g;
  visibleTeams.clear();
  document.getElementById('btn-w').classList.toggle('active', g==='W');
  document.getElementById('btn-m').classList.toggle('active', g==='M');
  renderAll();
}

renderAll();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIBA 3×3 — 2026 Season Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ════════════════════════════════════════════════════════
   COLOUR SYSTEM
   UI accent  : --accent  (FIBA orange-red) — chrome only
   Series     : --wt / --ch / --ws / --nl / --nt — categorisation
   Dark base  : warm charcoal-ink (not cold blue-navy)
   Light base : warm cream/paper  (not cold grey-blue)
════════════════════════════════════════════════════════ */

/* ─── DARK — warm charcoal ink ─── */
:root {
  --bg:      #141210;
  --s1:      #1c1916;
  --s2:      #222018;
  --s3:      #2c2820;
  --s4:      #38332a;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --white:   #f0ece4;
  --muted:   #6b6256;
  --muted2:  #9e9082;

  --accent:  #e8400c;   /* FIBA orange-red — UI chrome */
  --accent2: #ff6b35;   /* lighter tint for hover/glow */

  /* Series colours — warm, distinct, curated */
  --wt:  #f0a500;   /* World Tour  — amber gold   */
  --ch:  #38bdf8;   /* Challenger  — sky blue      */
  --ws:  #f87171;   /* Women's     — coral rose    */
  --nl:  #a78bfa;   /* Nations Lg  — soft violet   */
  --nt:  #2dd4bf;   /* National    — teal          */

  --wt-bg: rgba(240,165,0,0.10);
  --ch-bg: rgba(56,189,248,0.10);
  --ws-bg: rgba(248,113,113,0.10);
  --nl-bg: rgba(167,139,250,0.10);
  --nt-bg: rgba(45,212,191,0.10);

  /* Region filters */
  --r-eu:  #60a5fa;
  --r-u21: #c084fc;
  --r-am:  #fbbf24;
  --r-af:  #f87171;
  --r-as:  #38bdf8;
  --r-pa:  #34d399;

  --hero-grad: linear-gradient(150deg, #1e1a14 0%, #141210 60%);
  --hero-bg-text-color: rgba(255,255,255,0.03);
  --tabs-bg: rgba(20,18,16,0.95);
  --toggle-bg: #2c2820;
  --toggle-border: rgba(255,255,255,0.14);
  --toggle-icon-color: #9e9082;
}

/* ─── LIGHT — warm cream paper ─── */
[data-theme="light"] {
  --bg:      #faf8f5;
  --s1:      #ffffff;
  --s2:      #f3f0eb;
  --s3:      #e8e3da;
  --s4:      #dcd6cc;
  --border:  rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --white:   #1a1612;
  --muted:   #a09080;
  --muted2:  #6e5e50;

  --accent:  #d13408;
  --accent2: #e8400c;

  /* Series — rich ink tones for warm paper bg */
  --wt:  #b87800;
  --ch:  #0369a1;
  --ws:  #be123c;
  --nl:  #6d28d9;
  --nt:  #0f766e;

  --wt-bg: rgba(184,120,0,0.09);
  --ch-bg: rgba(3,105,161,0.09);
  --ws-bg: rgba(190,18,60,0.09);
  --nl-bg: rgba(109,40,217,0.09);
  --nt-bg: rgba(15,118,110,0.09);

  --hero-grad: linear-gradient(150deg, #f0ece3 0%, #faf8f5 60%);
  --hero-bg-text-color: rgba(0,0,0,0.04);
  --tabs-bg: rgba(250,248,245,0.97);
  --toggle-bg: #ffffff;
  --toggle-border: rgba(0,0,0,0.14);
  --toggle-icon-color: #6e5e50;
}

/* Light theme overrides for hover states */
[data-theme="light"] .event-link:hover { background:var(--s3); color:var(--white); border-color:rgba(0,0,0,0.18); }
[data-theme="light"] .rfbtn:hover { color:var(--white); border-color:rgba(0,0,0,0.2); }
[data-theme="light"] .tab-btn:hover { color:var(--white); }
[data-theme="light"] .time-tab:hover { color:var(--white); border-color:rgba(0,0,0,0.2); }
[data-theme="light"] .time-tab.active { background:var(--s3); color:var(--white); }
[data-theme="light"] .event-row:hover { background:var(--s2); }
[data-theme="light"] body::after { opacity:0.15; }
[data-theme="light"] .today-marker { background:rgba(3,105,161,0.06); border-color:rgba(3,105,161,0.18); color:var(--ch); }
[data-theme="light"] .today-marker::before { background:var(--ch); box-shadow:none; }
[data-theme="light"] .time-tab[data-time="upcoming"] .time-tab-dot { background:var(--ch); box-shadow:none; }
[data-theme="light"] .tag-eu  { color:#1d4ed8; background:rgba(59,130,246,0.1);  border-color:rgba(59,130,246,0.22); }
[data-theme="light"] .tag-u21 { color:#6d28d9; background:rgba(109,40,217,0.1); border-color:rgba(109,40,217,0.22); }
[data-theme="light"] .tag-am  { color:#92400e; background:rgba(251,191,36,0.12); border-color:rgba(251,191,36,0.3); }
[data-theme="light"] .tag-af  { color:#9f1239; background:rgba(248,113,113,0.1); border-color:rgba(248,113,113,0.22); }
[data-theme="light"] .tag-as  { color:#0369a1; background:rgba(56,189,248,0.1);  border-color:rgba(56,189,248,0.22); }
[data-theme="light"] .tag-pa  { color:#0f766e; background:rgba(45,212,191,0.1);  border-color:rgba(45,212,191,0.22); }

/* ─── THEME TOGGLE ─── */
.theme-toggle {
  display:flex; align-items:center; justify-content:center;
  width:36px; height:36px;
  border-radius:8px;
  border:1px solid var(--toggle-border);
  background:var(--toggle-bg);
  color:var(--toggle-icon-color);
  cursor:pointer;
  transition:all .2s;
  flex-shrink:0;
  position:absolute; top:0; right:0;
}
.theme-toggle:hover { border-color:var(--border2); color:var(--white); }
.theme-toggle svg { width:16px; height:16px; transition:transform .35s; }
.theme-toggle:hover svg { transform:rotate(20deg); }
.icon-sun  { display:none; }
.icon-moon { display:block; }
[data-theme="light"] .icon-sun  { display:block; }
[data-theme="light"] .icon-moon { display:none; }

/* grain */
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  opacity:.5;
}

/* ─── HERO ─── */
.hero {
  position: relative;
  overflow: hidden;
  padding: 3.5rem 2rem 2rem;
  background: var(--hero-grad);
  border-bottom: 1px solid var(--border2);
}
.hero-bg-text {
  position: absolute;
  right: -0.04em; top: -0.08em;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(140px, 24vw, 320px);
  line-height: 1;
  color: var(--hero-bg-text-color);
  pointer-events: none; user-select: none;
  letter-spacing: -0.02em;
}
.hero-inner { max-width: 1040px; margin: 0 auto; position: relative; z-index: 1; }

.theme-toggle {
  position: absolute;
  top: 0; right: 0;
}
.hero-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
  color: var(--accent);
  display: flex; align-items: center; gap: 10px;
  margin-bottom: .6rem;
}
.hero-eyebrow::before { content:''; width:24px; height:2px; background:var(--accent); flex-shrink:0; }
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(44px, 8vw, 86px);
  line-height: .9;
  letter-spacing: .02em;
  margin-bottom: 1.4rem;
}
.hero-title span { color: var(--accent); }

.series-pills {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-bottom: 1.8rem;
}
.series-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--s1);
  cursor: default;
}
.pill-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.pill-label { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted2); }
.pill-count { font-family:'Bebas Neue',sans-serif; font-size:18px; line-height:1; }

.hero-stats { display:flex; flex-wrap:wrap; gap:1.4rem; align-items:center; }
.hstat { display:flex; flex-direction:column; gap:2px; }
.hstat-n { font-family:'Bebas Neue',sans-serif; font-size:26px; line-height:1; letter-spacing:.03em; }
.hstat-l { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted2); }
.hdiv { width:1px; height:32px; background:var(--border2); }

/* ─── SERIES TABS ─── */
.tabs-wrap {
  position: sticky; top: 0; z-index: 60;
  background: var(--tabs-bg);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border2);
}
.tabs-inner {
  max-width: 1040px; margin: 0 auto;
  padding: 0 2rem;
  display: flex; align-items: stretch;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs-inner::-webkit-scrollbar { display:none; }

.tab-btn {
  font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  padding: 14px 20px;
  border: none; border-bottom: 2px solid transparent;
  background: transparent; color: var(--muted);
  cursor: pointer; white-space: nowrap;
  transition: all .18s;
  position: relative;
}
.tab-btn:hover { color: var(--white); }
.tab-btn.active { color: var(--white); }
.tab-btn[data-tab="all"].active     { border-color: var(--white); }
.tab-btn[data-tab="wt"].active      { border-color: var(--wt);  color: var(--wt); }
.tab-btn[data-tab="ch"].active      { border-color: var(--ch);  color: var(--ch); }
.tab-btn[data-tab="ws"].active      { border-color: var(--ws);  color: var(--ws); }
.tab-btn[data-tab="nl"].active      { border-color: var(--nl);  color: var(--nl); }
.tab-btn[data-tab="nt"].active      { border-color: var(--nt);  color: var(--nt); }

.tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  margin-left: 7px; padding: 1px 6px;
  border-radius: 99px; font-size: 9px; letter-spacing: .05em;
  background: var(--s3); color: var(--muted2);
  vertical-align: middle;
  transition: background .18s;
}
.tab-btn.active .tab-badge { background: var(--s4); color: var(--white); }

/* ─── SECONDARY CONTROLS ─── */
.controls-bar {
  max-width: 1040px; margin: 0 auto;
  padding: 1rem 2rem;
  display: flex; flex-direction: column; gap: .75rem;
}
.search-wrap { position:relative; flex:1; min-width:180px; }
.search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
.search-wrap input {
  width:100%; background:var(--s2); border:1px solid var(--border2);
  border-radius:6px; color:var(--white);
  font-family:'DM Sans',sans-serif; font-size:13px;
  padding:8px 12px 8px 36px; outline:none;
  transition: border-color .2s, background .2s;
}
.search-wrap input::placeholder { color:var(--muted); }
.search-wrap input:focus { border-color:var(--accent); background:var(--s3); }

/* Region filters (only shown for NL tab) */
.region-filters { display:flex; flex-wrap:wrap; gap:5px; }
.overview-link {
  display:none; align-items:center; gap:6px;
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase;
  padding:6px 12px; border-radius:6px;
  border:1px solid rgba(244,114,182,.3); background:var(--ws-bg); color:var(--ws);
  text-decoration:none; transition:all .15s; white-space:nowrap;
}
.overview-link:hover { background:var(--ws); color:#fff; border-color:var(--ws); }
.overview-link svg { flex-shrink:0; }
[data-theme="light"] .overview-link { border-color:rgba(190,18,60,.28); }
[data-theme="light"] .overview-link:hover { color:#fff; }
.rfbtn {
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase;
  padding:5px 11px; border-radius:4px; border:1px solid var(--border2);
  background:transparent; color:var(--muted2); cursor:pointer; transition:all .15s; white-space:nowrap;
}
.rfbtn:hover { color:var(--white); border-color:rgba(255,255,255,.2); }
.rfbtn.active { color:#fff; border-color:transparent; }
.rfbtn[data-r="all"].active   { background:#334155; }
.rfbtn[data-r="europe"].active   { background:var(--r-eu); }
.rfbtn[data-r="u21europe"].active{ background:var(--r-u21); }
.rfbtn[data-r="americas"].active { background:var(--r-am); color:#000; }
.rfbtn[data-r="africa"].active   { background:var(--r-af); }
.rfbtn[data-r="asia"].active     { background:var(--r-as); color:#000; }
.rfbtn[data-r="u21asia"].active  { background:var(--r-u21); }
.rfbtn[data-r="pacific"].active  { background:var(--r-pa); color:#000; }
#region-bar { display:none; }

/* ─── CONTENT ─── */
.content { max-width:1040px; margin:0 auto; padding:1.5rem 2rem 5rem; }

.month-group { margin-bottom:2.5rem; animation:fadeUp .28s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.month-heading {
  display:flex; align-items:center; gap:12px;
  margin-bottom:6px;
}
.month-name { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); }
.month-line { flex:1; height:1px; background:linear-gradient(to right, var(--border2), transparent); }
.month-ct { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.1em; color:var(--muted); }

.events-table { border:1px solid var(--border); border-radius:8px; overflow:hidden; }

.event-row {
  display:grid;
  grid-template-columns: 80px 18px 1fr auto;
  gap:0;
  align-items:center;
  border-bottom:1px solid var(--border);
  position:relative;
  transition:background .14s;
  cursor:default;
}
.event-row:last-child { border-bottom:none; }
.event-row:hover { background:var(--s2); }

/* left colour stripe — desktop: ::before pseudo; mobile: date-cell border-left (see media query) */
.event-row::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--stripe, transparent);
  transition:width .2s;
}
.event-row:hover::before { width:4px; }
/* On desktop the date-cell border-left should be transparent (stripe is on ::before) */
@media(min-width:641px){
  .date-cell { border-left-color: transparent !important; }
}

/* date */
.date-cell {
  padding:11px 12px;
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; align-items:flex-start; gap:1px;
  border-left: 3px solid var(--stripe, transparent);
}
.date-d { font-family:'Bebas Neue',sans-serif; font-size:22px; line-height:1; letter-spacing:.02em; }
.date-m { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted2); }
.date-w { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:1px; }
.date-w.wknd { color:var(--accent); }
.date-end { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); margin-top:2px; }

/* series stripe column */
.series-stripe { width:18px; align-self:stretch; }

/* info */
.info-cell { padding:11px 14px; min-width:0; }
.event-series {
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase;
  margin-bottom:3px;
}
.event-name { font-size:14px; font-weight:600; color:var(--white); line-height:1.3; margin-bottom:3px; }
.event-loc { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--muted2); }
.event-loc svg { color:var(--muted); flex-shrink:0; }

/* tag */
.tag-cell { padding:11px 12px 11px 8px; display:flex; align-items:center; justify-content:flex-end; gap:6px; flex-wrap:wrap; }
.tag {
  font-family:'DM Mono',monospace; font-size:9px; font-weight:500; letter-spacing:.12em; text-transform:uppercase;
  padding:3px 8px; border-radius:3px; border:1px solid transparent; white-space:nowrap;
}
/* series tags */
.tag-wt { background:var(--wt-bg);  color:var(--wt);  border-color:rgba(245,166,35,.22); }
.tag-ch { background:var(--ch-bg);  color:var(--ch);  border-color:rgba(56,189,248,.22); }
.tag-ws { background:var(--ws-bg);  color:var(--ws);  border-color:rgba(244,114,182,.22); }
.tag-nl { background:var(--nl-bg);  color:var(--nl);  border-color:rgba(129,140,248,.22); }
.tag-nt { background:var(--nt-bg);  color:var(--nt);  border-color:rgba(52,211,153,.22); }
/* region tags */
.tag-eu  { background:rgba(59,130,246,.12);  color:#93c5fd; border-color:rgba(59,130,246,.22); }
.tag-u21 { background:rgba(168,85,247,.12);  color:#d8b4fe; border-color:rgba(168,85,247,.22); }
.tag-am  { background:rgba(245,158,11,.12);  color:#fcd34d; border-color:rgba(245,158,11,.22); }
.tag-af  { background:rgba(239,68,68,.12);   color:#fca5a5; border-color:rgba(239,68,68,.22); }
.tag-as  { background:rgba(6,182,212,.12);   color:#67e8f9; border-color:rgba(6,182,212,.22); }
.tag-pa  { background:rgba(16,185,129,.12);  color:#6ee7b7; border-color:rgba(16,185,129,.22); }

.event-row.final-event .event-name::after {
  content: ' ★';
  color: var(--accent);
}

/* ─── TIME FILTER TABS ─── */
.time-tabs {
  display: flex; gap: 4px;
  padding: 0 0 0.9rem 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}
.time-tab {
  font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  padding: 7px 16px; border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent; color: var(--muted2);
  cursor: pointer; transition: all .16s;
  display: flex; align-items: center; gap: 7px;
}
.time-tab:hover { color: var(--white); border-color: rgba(255,255,255,.2); }
.time-tab.active {
  background: var(--s3); color: var(--white);
  border-color: var(--border2);
}
.time-tab[data-time="upcoming"].active { border-color: rgba(56,189,248,.35); color: var(--ch); }
.time-tab[data-time="previous"].active { border-color: rgba(255,255,255,.15); color: var(--muted2); }
.time-tab-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.time-tab[data-time="upcoming"] .time-tab-dot { background: var(--ch); box-shadow: 0 0 5px rgba(56,189,248,0.5); }
.time-tab[data-time="previous"] .time-tab-dot { background: var(--muted); }
.time-badge {
  font-size: 9px; padding: 1px 6px; border-radius: 99px;
  background: var(--s4); color: var(--muted2); letter-spacing: .05em;
}
.time-tab.active .time-badge { background: rgba(255,255,255,.1); color: var(--white); }

/* event link button */
.event-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  padding: 5px 10px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted2);
  text-decoration: none;
  white-space: nowrap;
  transition: all .16s;
  flex-shrink: 0;
}
.event-link:hover {
  background: var(--s3);
  color: var(--white);
  border-color: rgba(255,255,255,.22);
}
.event-link svg { flex-shrink: 0; transition: transform .16s; }
.event-link:hover svg { transform: translate(1px, -1px); }
/* Stats button — uses nl accent colour */
.event-link.stats-link {
  border-color: rgba(167,139,250,.3);
  color: var(--nl);
}
.event-link.stats-link:hover {
  background: var(--nl-bg);
  border-color: rgba(167,139,250,.5);
  color: var(--nl);
}
[data-theme="light"] .event-link.stats-link { border-color:rgba(109,40,217,.25); }
[data-theme="light"] .event-link.stats-link:hover { background:rgba(109,40,217,.08); border-color:rgba(109,40,217,.4); }

/* today marker row */
.today-marker {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px; margin: 4px 0;
  background: rgba(56,189,248,.05);
  border: 1px solid rgba(56,189,248,.18);

.event-row.past:hover { opacity: 1; }

/* empty */

.empty-big { font-family:'Bebas Neue',sans-serif; font-size:52px; letter-spacing:.05em; display:block; margin-bottom:.4rem; color:var(--s3); }

}
.footer-inner p { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
.footer-inner strong { color:var(--accent); font-weight:500; }

/* ─── MOBILE RESPONSIVE ─────────────────────────────────────────────────── */

/* On mobile the event row becomes a 2-col stacked layout:
   [date] [info]
          [tags + link]              */
@media(max-width:640px){

  /* Hero */
  .hero { padding: 2rem 1rem 1.5rem; }
  .hero-title { font-size: clamp(38px, 11vw, 56px); margin-bottom: 1rem; }
  .series-pills { gap: 7px; }

  .pill-count { font-size: 15px; }

  .hstat-n { font-size: 22px; }
  .hdiv { height: 26px; }

  /* Tabs bar */
  .tabs-inner { padding: 0; gap: 0; }
  .tab-btn { padding: 12px 14px; font-size: 10px; letter-spacing: .1em; }
  .tab-badge { display: none; }

  .controls-bar { padding: 0.75rem 1rem; gap: 0.6rem; }
  .time-tabs { gap: 5px; flex-wrap: nowrap; }

  .time-badge { font-size: 9px; padding: 1px 5px; }
  .region-filters { gap: 4px; }
  .rfbtn { font-size: 9px; padding: 4px 9px; }

  /* Content area */
  .content { padding: 1rem 0.75rem 4rem; }
  .month-heading { margin-bottom: 5px; }

  /* ── Event row: 2-column on mobile ── */
  .event-row {
    grid-template-columns: 72px 1fr;
    grid-template-rows: auto auto;
    grid-template-areas:

      "date bottom";
    align-items: start;
    padding: 0;
  }

  /* The series-stripe column is gone on mobile — hide it */
  .series-stripe { display: none; }

  .date-cell {
    grid-area: date;

    border-right: 1px solid var(--border);
    align-self: stretch;
    justify-content: flex-start;

  .date-d { font-size: 20px; }
  .date-m { font-size: 9px; }
  .date-w { font-size: 9px; }

  .info-cell {

  .event-series { font-size: 9px; margin-bottom: 2px; }
  .event-name { font-size: 13px; margin-bottom: 2px; }
  .event-loc { font-size: 11px; }

  .tag-cell {
    grid-area: bottom;

    justify-content: flex-start;
    flex-wrap: wrap;
    gap: 5px;

    font-size: 9px;

  .tag { font-size: 8px; padding: 2px 6px; }

  /* Footer */
  footer .footer-inner {
    padding: 1.2rem 1rem 2rem;
    flex-direction: column;
    gap: 4px;
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
const SERIES_LABEL = {wt:"World Tour", ch:"Challenger", ws:"Women's Series", nl:"Nations League", nt:"National"};
const SERIES_COLOR = {wt:"var(--wt)", ch:"var(--ch)", ws:"var(--ws)", nl:"var(--nl)", nt:"var(--nt)"};
const SERIES_TAG   = {wt:"tag-wt", ch:"tag-ch", ws:"tag-ws", nl:"tag-nl", nt:"tag-nt"};

function dt(d){ return new Date(d+"T00:00:00"); }
function fmtShort(d){ const x=dt(d); return {day:String(x.getDate()).padStart(2,"0"), mon:MONS[x.getMonth()], dow:DAYS[x.getDay()], wknd:x.getDay()===0||x.getDay()===6}; }
function monthKey(d){ const x=dt(d); return MONSL[x.getMonth()]+" "+x.getFullYear(); }

// An event is "upcoming" if its END date >= today (so ongoing events stay in Upcoming)
// An event is "past" if its END date < today
function isUpcoming(e){ return (e.end || e.start) >= TODAY_STR; }
function isPast(e){ return (e.end || e.start) < TODAY_STR; }

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const q = "";

  // Base filter: series + region + search
  let base = ALL_EVENTS.filter(e => {
    if(activeTab !== "all" && e.s !== activeTab) return false;
    if(activeTab === "nl" && activeRegion !== "all" && e.region !== activeRegion) return false;
    if(q && !e.name.toLowerCase().includes(q) && !e.city.toLowerCase().includes(q) && !e.country.toLowerCase().includes(q)) return false;
    return true;
  });

  // Update time-tab badges (using end date)
  const upcomingCount = base.filter(isUpcoming).length;
  const previousCount = base.filter(isPast).length;
  document.getElementById("badge-upcoming").textContent = upcomingCount;
  document.getElementById("badge-previous").textContent = previousCount;
  document.getElementById("badge-time-all").textContent = base.length;

  // Apply time filter (sort previous newest-first)
  let filtered = base;
  if(activeTime === "upcoming") filtered = base.filter(isUpcoming);
  if(activeTime === "previous") filtered = base.filter(isPast).reverse();

  document.getElementById("hero-total").textContent = filtered.length;

  // group by month
  const grouped = {};
  filtered.forEach(e => {
    const mk = monthKey(e.start);
    if(!grouped[mk]) grouped[mk]=[];
    grouped[mk].push(e);
  });

  const container = document.getElementById("list");
  if(!filtered.length){
    const msg = activeTime === "upcoming" ? "No upcoming events match." : "No previous events found.";
    container.innerHTML=`<div class="empty"><span class="empty-big">${activeTime==="upcoming"?"ALL DONE":"NOTHING YET"}</span>${msg}</div>`;
    return;
  }

  // For "previous" tab, months are already in reverse order from the reversed array
  // Re-sort within each month for "previous": newest first
  const monthEntries = Object.entries(grouped);

  container.innerHTML = monthEntries.map(([month, evts], gi) => {
    const rows = evts.map(e => {
      const f = fmtShort(e.start);
      const ef = e.end && e.end !== e.start ? fmtShort(e.end) : null;
      const seriesTag = SERIES_TAG[e.s];
      const seriesColor = SERIES_COLOR[e.s];
      const seriesLabel = SERIES_LABEL[e.s];
      const isPastRow = isPast(e);

      let regionTagHtml = "";
      if(e.region && REGION_META[e.region]){
        const rm = REGION_META[e.region];
        regionTagHtml = `<span class="tag ${rm.tag}">${rm.label}</span>`;
      }

      const subtitle = e.s === "nl"
        ? `<div class="event-series" style="color:var(--nl)">${e.conf}</div>`
        : `<div class="event-series" style="color:${seriesColor}">${seriesLabel}</div>`;

      const endHtml = ef ? `<div class="date-end">→ ${ef.mon} ${ef.day}</div>` : "";

      return `<div class="event-row${e.final?' final-event':''}${isPastRow&&activeTime==='all'?' past':''}" style="--stripe:${seriesColor}">
        <div class="date-cell">
          <div class="date-d">${f.day}</div>
          <div class="date-m">${f.mon}</div>
          <div class="date-w${f.wknd?' wknd':''}">${f.dow}</div>
          ${endHtml}
        </div>
        <div class="series-stripe"></div>
        <div class="info-cell">
          ${subtitle}
          <div class="event-name">${e.name}</div>
          <div class="event-loc">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            ${e.city}, ${e.country}
          </div>
        </div>
        <div class="tag-cell">
          <span class="tag ${seriesTag}">${seriesLabel}</span>
          ${regionTagHtml}
          ${e.statsUrl ? `<a class="event-link stats-link" href="${e.statsUrl}" target="_blank" rel="noopener">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Stats
          </a>` : ""}
          ${e.url ? `<a class="event-link" href="${e.url}" target="_blank" rel="noopener">
            View
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>` : ""}
        </div>
      </div>`;
    }).join("");

    return `<div class="month-group" style="animation-delay:${gi*0.04}s">
      <div class="month-heading">
        <span class="month-name">${month}</span>
        <div class="month-line"></div>
        <span class="month-ct">${evts.length} event${evts.length!==1?"s":""}</span>
      </div>
      <div class="events-table">${rows}</div>
    </div>`;
  }).join("");
}

document.getElementById('themeToggle').addEventListener('click', () => {
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('fiba3x3-theme', next);
});

// init badges on load then render
render();
</script>
